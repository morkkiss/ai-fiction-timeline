<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty WCAG Checker</title>
    <link rel="stylesheet" href="vendor/tailwind.min.css">
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <style>
      body { min-height: 100vh; }
    </style>
  <script>
// Hide the standalone-page chrome (top nav strip, etc.) when this page is rendered inside an iframe.
// The MkDocs site already provides toolkit navigation; we don't want to duplicate it.
(function() {
  try {
    if (window !== window.top) {
      document.documentElement.classList.add('in-iframe');
    }
  } catch (e) { /* cross-origin SecurityError on window.top — ignore */ }
})();
</script>
<style>
.in-iframe nav[aria-label="Toolkit navigation"],
.in-iframe header > div > div.text-xs.text-slate-600.text-right { display: none !important; }
</style>
</head>
  <body class="bg-white text-slate-800">
    <noscript>
      <div style="padding: 20px; font-family: Arial, sans-serif;">
        JavaScript is required to use the Faculty WCAG Checker.
      </div>
    </noscript>

    <div id="tls-wcag-checker-root"></div>

    <script src="checker.bundle.js"></script>
  </body>
</html>
