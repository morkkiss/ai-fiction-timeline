                Static Only
              </label>
              {IS_ELECTRON ? (
                <label className="flex items-center gap-1.5">
                  <input
                    type="radio"
                    name="audit-mode"
                    value={AUDIT_MODE_FULL}
                    checked={auditMode === AUDIT_MODE_FULL}
                    onChange={() => setAuditMode(AUDIT_MODE_FULL)}
                  />
                  Full Audit (requires live URL)
                </label>
              ) : (
                <span className="text-xs italic text-slate-500">
                  Full Audit requires the desktop app. Browser version runs Static Analysis.
                </span>
              )}
            </div>
            {IS_ELECTRON && auditMode === AUDIT_MODE_FULL && (
              <label className="block text-xs text-slate-700">
                Enter live URL for rendered checks
                <input
                  value={auditUrl}
                  onChange={(e) => setAuditUrl(e.target.value)}
                  placeholder="https://course.example.edu/page"
                  className="mt-1.5 block w-full rounded border border-slate-300 p-2 text-sm"
                />
              </label>
            )}
          </div>
          <div className="flex flex-wrap items-center gap-2.5 px-3.5 pb-3.5">
            <button
              type="button"
              onClick={run}
              disabled={!input.trim()||loading}
              className={`rounded border px-7 py-2.5 text-xs font-bold tracking-wide transition ${
                input.trim()&&!loading
                  ? "bg-blue-900 text-white border-blue-900 cursor-pointer"
                  : "bg-slate-300 text-slate-500 border-slate-300 cursor-not-allowed"
              }`}
              aria-label={loading ? "Scanning HTML now" : "Run accessibility audit and apply safe fixes"}
            >
              {loading ? "SCANNING..." : "AUDIT + FIX"}
            </button>
            {loading && <span className="text-sm text-slate-500">{scanStatusMessage || "Checking WCAG 2.1 AA criteria..."}</span>}
          </div>
        </section>

        {/* Results */}
        {result && (
          <div>
            <div className="grid gap-3 mb-4 grid-cols-1 md:grid-cols-2">
              {[
                { label:"BEFORE AUTO-FIX", r: res, classes: getScoreColorClass(res?.score), bar: getScoreBarColorClass(res?.score), width: getScoreBarWidthClass(res?.score || 0) },
                { label:"AFTER AUTO-FIX", r: fixedRes, classes: getScoreColorClass(fixedRes?.score), bar: getScoreBarColorClass(fixedRes?.score), width: getScoreBarWidthClass(fixedRes?.score || 0) },
              ].map(({ label, r, color }) => (
                <div key={label} className="rounded-2xl border border-slate-200 bg-white p-4.5 shadow-[0_14px_34px_-30px_rgba(15,23,42,0.35)]">
                  <div className="mb-2.5 text-xs font-semibold tracking-wide text-slate-600">{label}</div>
                  <div className="mb-2.5 flex items-baseline gap-2.5">
                    <span className={`leading-none text-4xl font-bold ${getScoreColorClass(r?.score)}`}>{r?.score ?? 0}</span>
                    <span className="text-sm text-slate-500">/100</span>
                  </div>
                  <div className="mb-3 h-1 rounded bg-slate-200">
                    <div className={`h-full rounded ${getScoreBarColorClass(r?.score)} ${getScoreBarWidthClass(r?.score || 0)} transition duration-500`} />
                  </div>
                  <div className="flex flex-wrap gap-4">
                    {[["critical",r.findings.filter(f=>f.severity==="critical").length],[
                      "warning",
                      r.findings.filter(f=>f.severity==="warning").length,
                    ],["advisory",r.findings.filter(f=>f.severity==="advisory").length]].map(([severityKey,n])=>(
                      <div key={severityKey} className="text-sm text-slate-700">
                        <span className={`font-bold ${getSevClasses(severityKey).colorClass}`}>{getSevClasses(severityKey).label}: {n}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="mb-4 grid gap-3 sm:grid-cols-2">
              <div className="rounded-2xl border border-red-200 bg-red-50 p-3.5 shadow-[0_14px_34px_-30px_rgba(127,29,29,0.35)]">
                <div className="mb-1.5 text-xs font-semibold tracking-wide text-red-900">WCAG 2.1 AA Violations</div>
                <div className="text-3xl font-bold text-red-900">{wcagBeforeSummary.total}</div>
                <div className="text-xs text-red-900">Critical {wcagBeforeSummary.critical} · Warning {wcagBeforeSummary.warning} · Advisory {wcagBeforeSummary.advisory}</div>
              </div>
              <div className="rounded-2xl border border-yellow-300 bg-yellow-50 p-3.5 shadow-[0_14px_34px_-30px_rgba(146,64,14,0.28)]">
                <div className="mb-1.5 text-xs font-semibold tracking-wide text-yellow-800">Content Quality Flags</div>
                <div className="text-3xl font-bold text-yellow-800">{qualityBeforeSummary.total}</div>
                <div className="text-xs text-yellow-800">Critical {qualityBeforeSummary.critical} · Warning {qualityBeforeSummary.warning} · Advisory {qualityBeforeSummary.advisory}</div>
              </div>
            </div>

            {result.fixes.length > 0 && (
              <div className="mb-4 rounded border border-green-300 bg-green-50 p-4">
                <div className="mb-2 flex items-center justify-between">
                  <div className="text-xs font-semibold tracking-wide text-green-800">
                    ✓ {result.fixes.length} FIXES APPLIED AUTOMATICALLY · Auto-fixes applied: {fixedByEngine}
                  </div>
                  <CopyButton text={result.fixedHTML} />
                </div>
                <div className="text-xs text-green-800 leading-7">
                  {result.fixes.map((f, i) => (
                    <div key={i}>· [{f.criterion}] {f.description}</div>
                  ))}
                </div>
              </div>
            )}

            <section className="mb-4 rounded border border-slate-200 bg-white p-3">
              <div className="mb-3 grid gap-3 grid-cols-1 md:grid-cols-2">
                <label className="block text-xs text-slate-700">
                  Site URL (optional)
                  <input
                    value={siteUrl}
                    onChange={e=>setSiteUrl(e.target.value)}
                    className="mt-1.5 block w-full rounded border border-slate-300 p-2 text-sm"
                    placeholder="https://course.example.edu/page"
                  />
                </label>
                <label className="block text-xs text-slate-700">
                  Operator name (optional)
                  <input
                    value={operatorName}
                    onChange={e=>setOperatorName(e.target.value)}
                    className="mt-1.5 block w-full rounded border border-slate-300 p-2 text-sm"
                    placeholder="Instructor or Accessibility owner"
                  />
                </label>
              </div>
              <div className="flex flex-wrap gap-2.5">
                <button type="button" onClick={generateReport} className="rounded border border-blue-900 bg-blue-900 px-3.5 py-2 text-xs font-semibold tracking-wide text-white">
                  Generate Compliance Report
                </button>
                <button type="button" onClick={generateStatement} className="rounded border border-blue-900 bg-white px-3.5 py-2 text-xs font-semibold tracking-wide text-blue-900">
                  Generate Accessibility Statement
                </button>
                {statementHTML && <CopyButton text={statementHTML} />}
              </div>
              {statementHTML && (
                <pre className="mt-3 max-h-44 overflow-auto rounded border border-slate-300 bg-slate-50 p-2.5 text-xs whitespace-pre-wrap break-all">
                  {statementHTML}
                </pre>
              )}
            </section>

            {/* Tab bar */}
            <div role="tablist" aria-label="Result views" onKeyDown={onTabKeyDown} className="mb-4 flex gap-0 border-b border-slate-200">
              {[
                ["audit","Original Issues",res?.findings.length],
                ["fixed","Remaining Issues",fixedRes?.findings.length],
                ["html","Fixed HTML",null],
                ["contrast","Contrast Check",null],
              ].map(([t,label,count])=>(
                <button
                  type="button"
                  role="tab"
                  id={`${t}-tab`}
                  tabIndex={tab===t ? 0 : -1}
                  aria-selected={tab===t}
                  aria-controls={`${t}-panel`}
                  key={t}
                  onClick={()=>setActiveTab(t)}
                  className={`px-5 py-2.5 text-xs font-semibold tracking-wide transition ${tab === t ? "bg-white text-blue-900 border-b-2 border-blue-900" : "bg-transparent text-slate-500 border-b-2 border-transparent"}`}
                >
                  {label}
                  {typeof count === "number" && count > 0 && <span className="ml-1.5 rounded-full bg-blue-900 px-1.5 py-0.5 text-xs text-white">{count}</span>}
                </button>
              ))}
            </div>

            {/* Tab: Original Audit */}
            {tab === "audit" && (
              <section role="tabpanel" id="audit-panel" aria-labelledby="audit-tab">
                <div className="mb-2.5 flex flex-wrap gap-2">
                  <button
                    type="button"
                    onClick={() => setFindingCategory("wcag")}
                    aria-pressed={findingCategory==="wcag"}
                    className={`rounded border px-3 py-1.5 text-xs font-semibold tracking-wide ${
                      findingCategory === "wcag"
                        ? "bg-blue-50 border-blue-900 text-blue-900"
                        : "bg-transparent border-slate-300 text-slate-600"
                    }`}
                  >
                    WCAG 2.1 AA Violations ({wcagFindings.length})
                  </button>
                  <button
                    type="button"
                    onClick={() => setFindingCategory("quality")}
                    aria-pressed={findingCategory==="quality"}
                    className={`rounded border px-3 py-1.5 text-xs font-semibold tracking-wide ${
                      findingCategory === "quality"
                        ? "bg-yellow-50 border-yellow-800 text-yellow-800"
                        : "bg-transparent border-slate-300 text-slate-600"
                    }`}
                  >
                    Content Quality Flags ({qualityFindings.length})
                  </button>
                </div>
                <div className="mb-3 flex flex-wrap gap-2">
                  {[
                    ["all","All",activeFindings.length],
                    ["critical","Critical",activeSummary.critical],
                    ["warning","Warning",activeSummary.warning],
                    ["advisory","Advisory",activeSummary.advisory],
                  ].map(([f,label,count])=>(
                    <button
                      type="button"
                      key={f}
                      aria-pressed={filterSev===f}
                      onClick={()=>setFilterSev(f)}
                      className={`rounded border px-3 py-1.5 text-xs font-semibold tracking-wide ${
                        filterSev === f
                          ? "bg-indigo-50 border-blue-900 text-blue-900"
                          : "bg-transparent border-slate-300 text-slate-500"
                      }`}
                    >
                      {label} ({count})
                    </button>
                  ))}
                </div>
                {filtered.length === 0
                  ? <div className="rounded border border-slate-200 bg-white p-8 text-center text-sm text-slate-500">✓ No issues match this view.</div>
                  : filtered.map(f => {
                      const s = SEV[f.severity] || SEV.info;
                      const isExp = expanded.has(f.id);
                      return (
                        <div key={f.id} className={`mb-2 overflow-hidden rounded border border-slate-200 bg-white ${s.borderClass}`}>
                          <button
                            type="button"
                            aria-expanded={isExp}
                            aria-controls={`issue-${f.id}-details`}
                            onClick={()=>toggle(f.id)}
                            className={`flex w-full items-start gap-2.5 border-none bg-white p-3 text-left text-inherit`}
                          >
                            <span className={`mt-0.5 flex-shrink-0 text-sm ${s.colorClass}`}>{s.dot}</span>
                            <div className="min-w-0 flex-1">
                              <div className="mb-0.5 flex flex-wrap items-center gap-2">
                                <span className={`inline-flex rounded border bg-blue-50 px-1.5 py-0.5 text-xs font-bold tracking-wide ${getSevClasses("info").colorClass}`}>{f.criterion}</span>
                                <span className="text-xs text-slate-500">Level {f.level}</span>
                                <span className={`text-xs font-bold tracking-wide ${s.colorClass}`}>{s.label}</span>
                              </div>
                              <div className="text-xs leading-5 text-slate-700">{f.issue}</div>
                            </div>
                            <span className="flex-shrink-0 text-xs text-slate-500">{isExp ? "▲" : "▼"}</span>
                          </button>
                          {isExp && (
                            <div id={`issue-${f.id}-details`} className="border-t border-slate-200 bg-slate-50 p-3">
                          {f.fix && <div className="mb-2.5">
                            <div className="mb-1 text-xs font-bold tracking-wide text-green-800">AUTOMATED CHECK RESULT</div>
                            <div className="text-sm leading-6 text-slate-700">{f.fix}</div>
                          </div>}
                              <div className="mb-2.5">
                                <div className="mb-1 text-xs font-bold tracking-wide text-blue-900">WHY IT MATTERS</div>
                                <div className="text-sm leading-6 text-slate-700">{(f.guidance && f.guidance.why) || "This can affect student accessibility."}</div>
                              </div>
                              <div className="mb-2.5">
                                <div className="mb-1 text-xs font-bold tracking-wide text-blue-900">HOW TO FIX</div>
                                <div className="text-sm leading-6 text-slate-700">{(f.guidance && f.guidance.how) || "Update the flagged element to follow the rule."}</div>
                                {f.guidance && f.guidance.example && (
                                  <pre className="mt-2 overflow-auto whitespace-pre-wrap break-all rounded border border-green-200 bg-white p-2 text-xs text-green-800">{f.guidance.example}</pre>
                                )}
                              </div>
                              <div className="mb-2">
                                <div className="mb-1 text-xs font-bold tracking-wide text-slate-500">WHERE TO CHANGE</div>
                                <div className="text-sm leading-6 font-mono text-slate-700">{f.where || "Not tied to a single element (layout-wide check)."}</div>
                              </div>
                              {f.element && <div>
                                <div className="mb-1 text-xs font-bold tracking-wide text-slate-500">ELEMENT</div>
                                <pre className="mt-0 overflow-auto whitespace-pre-wrap break-all rounded border border-green-200 bg-white p-2 text-xs text-green-800">{f.element}</pre>
                              </div>}
                            </div>
                          )}
                        </div>
                      );
                    })
                }
              </section>
            )}

            {/* Tab: Remaining issues after fix */}
            {tab === "fixed" && (
              <section role="tabpanel" id="fixed-panel" aria-labelledby="fixed-tab">
                {fixedRes.findings.length === 0
                  ? <div className="rounded border border-green-300 bg-green-50 p-9 text-center text-sm text-green-800">
                      ✓ No remaining findings in post-fix scan.
                    </div>
                  : fixedRes.findings.map(f => {
                      const s = SEV[f.severity] || SEV.info;
                      return (
                        <div key={f.id} className={`mb-2 rounded border border-slate-200 bg-white p-3 ${s.borderClass}`}>
                          <div className="mb-1 flex flex-wrap items-center gap-2">
                            <span className={s.colorClass}>{s.dot}</span>
                            <span className={`rounded bg-blue-50 px-1.5 py-0.5 text-xs font-bold text-blue-900`}>{f.criterion}</span>
                            <span className={`text-xs font-bold ${s.colorClass}`}>{s.label}</span>
                          </div>
                          <div className="text-sm text-slate-700">{f.issue}</div>
                          <div className="mt-2 text-xs text-slate-600">
                            {(f.guidance && f.guidance.how) || f.fix}
                          </div>
                          {f.guidance && f.guidance.example && (
                            <pre className="mt-2 overflow-auto whitespace-pre-wrap break-all rounded border border-green-200 bg-slate-50 p-2 text-xs text-green-800">{f.guidance.example}</pre>
                          )}
                          {f.fix && <div className="mt-1.5 text-xs text-slate-500">Fix: {f.fix}</div>}
                        </div>
                      );
                    })
                }
              </section>
            )}

            {/* Tab: Fixed HTML output */}
            {tab === "html" && (
              <section role="tabpanel" id="html-panel" aria-labelledby="html-tab">
                <div className="mb-3 flex items-center justify-between">
                  <div className="text-xs text-slate-500">
                    Copy this, paste it back into your editor or LMS.
                    {result.fixes.some(f=>f.description.includes("REVIEW")) && " Search for data-tls-needs-review to find items needing manual review."}
                  </div>
                  <CopyButton text={result.fixedHTML} />
                </div>
                <pre className="max-h-96 overflow-auto whitespace-pre-wrap break-all rounded border border-slate-200 bg-white p-4 text-xs leading-6 text-slate-700">
                  {result.fixedHTML}
                </pre>
              </section>
            )}

            {/* Tab: Contrast check */}
            {tab === "contrast" && (
              <section role="tabpanel" id="contrast-panel" aria-labelledby="contrast-tab">
                <div className="mb-3 grid gap-3">
                  <div className="grid gap-3 sm:grid-cols-2">
                    <label className="text-xs text-slate-700">
                      Foreground hex color
                      <input
                        value={contrastForeground}
                        onChange={e=>setContrastForeground(e.target.value)}
                        placeholder="#111827"
                        className="mt-1.5 block w-full rounded border border-slate-300 p-2 text-sm"
                      />
                    </label>
                    <label className="text-xs text-slate-700">
                      Background hex color
                      <input
                        value={contrastBackground}
                        onChange={e=>setContrastBackground(e.target.value)}
                        placeholder="#FFFFFF"
                        className="mt-1.5 block w-full rounded border border-slate-300 p-2 text-sm"
                      />
                    </label>
                  </div>
                  <div>
                    <button type="button" onClick={buildContrast} className="rounded border border-blue-900 bg-blue-900 px-3.5 py-2 text-xs font-semibold tracking-wide text-white">
                      Check Contrast
                    </button>
                  </div>
                  <label className="text-xs text-slate-700">
                    Batch mode (one pair per line as `foreground background`)
                    <textarea
                      value={contrastBatch}
                      onChange={e=>setContrastBatch(e.target.value)}
                      placeholder={`#111827 #FFFFFF\n#888 #eee\nrgb(20 20 20) #fff`}
                      rows="4"
                      className="mt-1.5 block w-full resize-y rounded border border-slate-300 p-2 text-sm"
                    />
                  </label>
                  <div>
                    <button type="button" onClick={buildContrast} className="rounded border border-blue-900 bg-slate-100 px-3.5 py-2 text-xs font-semibold tracking-wide text-blue-900">
                      Run Batch Check
                    </button>
                  </div>
                </div>

                {contrastResults.length === 0 ? (
                  <div className="rounded border border-slate-200 bg-white p-5 text-center text-sm text-slate-500">No contrast results yet. Enter colors and click check.</div>
                ) : (
                  <div className="grid gap-2.5">
                    {contrastResults.map((row) => {
                      if (row.error) {
                        return (
                          <div key={row.id} className="rounded border border-red-200 bg-red-50 p-2.5 text-red-900">
                            <div className="text-sm font-bold">{row.input}</div>
                            <div className="text-sm">{row.error}</div>
                          </div>
                        );
                      }
                      return (
                        <div key={row.id} className="rounded border border-slate-300 bg-white p-2.5">
                          <div className="mb-1.5 text-xs text-slate-700"><strong>Pair:</strong> {row.input}</div>
                          <div className="text-sm text-slate-700">
                            Contrast ratio: <strong>{row.ratio}</strong> | Normal text: <strong className={getContrastClass(row.normal)}>{formatContrastStatus(row.normal)}</strong> (need 4.5:1) | Large text: <strong className={getContrastClass(row.large)}>{formatContrastStatus(row.large)}</strong> (need 3:1) | UI components: <strong className={getContrastClass(row.ui)}>{formatContrastStatus(row.ui)}</strong> (need 3:1)
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </section>
            )}

            {/* Footer note */}
            <div className="mt-5 rounded border border-slate-200 bg-white p-3.5 text-xs leading-7 text-slate-500">
              <strong className="text-slate-700">What this covers:</strong> 1.1.1 alt text, 1.2.2 captions/media controls, 1.3.1 heading hierarchy, 2.4.1 skip navigation, 2.4.2 title element, 2.4.3 keyboard-focus flow, 2.1.1 keyboard support, 1.4.3 text contrast checks, 2.4.4 link purpose, 3.1.1 language, 4.1.2 accessible names, plus structure checks for duplicate IDs and form labels.
              · <strong className="text-slate-700">Need help:</strong> {CONTACT_EMAIL}
            </div>
            <div className="mt-3 text-xs text-slate-500">
              Faculty WCAG Checker v{TLS_VERSION}
            </div>
          </div>
        )}

        {/* Empty state */}
        {!result && !loading && (
          <div className="py-15 px-6 text-center text-slate-600">
            <div className="mb-3 text-4xl">⚡</div>
            <div className="mb-1.5 text-sm tracking-wide">Paste HTML and click Audit + Fix</div>
            <div className="text-sm text-slate-500">Works with Brightspace exports, learning platforms, and any course HTML.</div>
          </div>
        )}
      </main>
        {showOnboarding && <OnboardingModal onAgree={onAcceptTerms} onDecline={onDeclineTerms} />}
      </div>
    </ScanErrorBoundary>
  );
}

      const TLS_WCAG_CHECKER_ROOT_ID = "tls-wcag-checker-root";
      const rootNode = document.getElementById(TLS_WCAG_CHECKER_ROOT_ID);
      if (rootNode) {
        const root = createRoot(rootNode);
        root.render(<App />);
      }
    </script>
  </body>
</html>
